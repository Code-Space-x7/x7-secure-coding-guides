name: Apply Ruleset

on:
  push:
    paths:
      - ".github/rulesets/**"

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply ruleset
        run: gh api repos/${{ github.repository }}/rulesets \
          --method POST \
          --input .github/rulesets/main-branch-protection.json
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}